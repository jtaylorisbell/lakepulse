bundle:
  name: lakepulse

sync:
  include:
    - app/frontend/dist/**

resources:
  # ── Lakebase ────────────────────────────────────────────────────
  postgres_projects:
    lakepulse_db:
      project_id: lakepulse
      display_name: LakePulse
      pg_version: 17

  # ── Databricks App ──────────────────────────────────────────────
  apps:
    lakepulse:
      name: lakepulse
      description: "Real-time Wikipedia edits dashboard"
      source_code_path: .
      user_api_scopes:
        - sql
      config:
        command:
          - uvicorn
          - app.backend.main:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
