bundle:
  name: lakepulse

variables:
  catalog:
    default: classic_stable_yddmqb
  schema:
    default: default
  lakebase_project:
    default: lakepulse

resources:
  # ── Lakebase is provisioned externally (project: lakepulse) ─────
  # See alembic/ for schema migrations.

  # ── Cluster ─────────────────────────────────────────────────────
  clusters:
    lakepulse_cluster:
      cluster_name: lakepulse-cluster
      spark_version: 17.3.x-scala2.13
      node_type_id: Standard_D4ds_v5
      num_workers: 0
      single_user_name: taylor.isbell@databricks.com
      data_security_mode: SINGLE_USER
      runtime_engine: STANDARD
      autotermination_minutes: 120
      spark_conf:
        spark.databricks.streaming.realTimeMode.enabled: "true"
        spark.master: "local[*, 4]"
        spark.databricks.cluster.profile: singleNode
      custom_tags:
        ResourceClass: SingleNode

  # ── Streaming Job: Delta → Lakebase ─────────────────────────────
  jobs:
    stream_to_lakebase:
      name: lakepulse-stream-to-lakebase
      max_concurrent_runs: 1
      tasks:
        - task_key: stream
          notebook_task:
            notebook_path: ./streaming/stream_to_lakebase.py
            base_parameters:
              landing_table: ${var.catalog}.${var.schema}.lakepulse_metrics_raw
              lakebase_project: ${var.lakebase_project}
          existing_cluster_id: ${resources.clusters.lakepulse_cluster.cluster_id}
          timeout_seconds: 0

  # ── Databricks App ──────────────────────────────────────────────
  apps:
    lakepulse:
      name: lakepulse
      description: "Real-time Mac hardware metrics dashboard"
      source_code_path: ./app
      config:
        command:
          - uvicorn
          - app.backend.main:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
