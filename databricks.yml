bundle:
  name: lakepulse

permissions:
  - user_name: taylor.isbell@databricks.com
    level: CAN_MANAGE

resources:
  # ── Lakebase ────────────────────────────────────────────────────
  postgres_projects:
    lakepulse_db:
      project_id: lakepulse
      display_name: LakePulse
      pg_version: 17

  # ── Databricks App ──────────────────────────────────────────────
  apps:
    lakepulse:
      name: lakepulse
      description: "Real-time Wikipedia edits dashboard"
      source_code_path: .
      resources:
        - name: postgres
          postgres:
            branch: projects/lakepulse/branches/production
            # Auto-generated database ID — not exposed by DABs for dynamic reference
            database: projects/lakepulse/branches/production/databases/db-pncg-o7y0cs6idn
            permission: CAN_CONNECT_AND_CREATE

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
